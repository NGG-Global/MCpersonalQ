name: Deploy to GitHub Pages

# בנייה ופריסה אוטומטית של האפליקציה הסטטית ל-GitHub Pages.
# הפריסה רצה לאחר מיזוג לענף הראשי (main). אפשר גם להריץ ידנית מכל ענף
# דרך הכרטיסייה Actions ("Run workflow") לצורך בדיקה.

on:
  push:
    branches: [main]
  workflow_dispatch:

# הרשאות נדרשות לפרסום ב-Pages דרך Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# מבטיח שרק פריסה אחת תרוץ בכל רגע, ומבטל פריסות שמתיישנות.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # מפעיל את GitHub Pages ומעביר אותו למצב בנייה "GitHub Actions".
      # enablement: true מבטיח שהאתר מוגדר ל-build_type=workflow, כך
      # שצעד הפריסה (deploy-pages) לא ייכשל עם שגיאת 404.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
